name: Release
permissions:
  contents: write

on:
  push:
    tags:
      - v*.*.*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - run: go vet ./...
    - name: Check go.mod file
      run: |
        go mod tidy && git diff --exit-code || (echo "go.mod file is not clean. Run 'go mod tidy' locally and commit the changes" && exit 1)
    - name: Build binaries
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-X main.version=${GITHUB_REF_NAME}" -o lsusbc-linux-amd64 .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-X main.version=${GITHUB_REF_NAME}" -o lsusbc-linux-arm64 .

    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >-
        bash .github/workflows/release.sh ${GITHUB_REF_NAME}
